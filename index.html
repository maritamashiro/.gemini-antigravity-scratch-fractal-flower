<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Breath-Bloom Fractal Flower 🌸</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="An interactive celestial botanical art prototype. Blow into your microphone to make an illustrated, hand-drawn fractal plant study bloom.">
  <meta name="keywords" content="p5.js, generative art, L-system, dragon curve, interactive web art, creative coding, botanical illustration">
  
  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
  
  <!-- p5.js and p5.sound CDN Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>

  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f5f2eb; /* Antique parchment background */
      font-family: 'Outfit', sans-serif;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* Paper texture overlay for the hand-drawn illustration feeling */
    .paper-texture {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0.12; /* Slightly stronger for print textures */
      /* SVG Turbulence noise creating realistic paper grains */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Full-screen Intro Glass Overlay (tap anywhere to enable mic) */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(245, 242, 235, 0.82); /* Warm light cream parchment glass */
      backdrop-filter: blur(25px) saturate(120%);
      -webkit-backdrop-filter: blur(25px) saturate(120%);
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
      padding: clamp(16px, 4vw, 36px);
      cursor: pointer;
    }

    /* Intro Card Design */
    .intro-card {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(74, 72, 67, 0.12);
      border-radius: 24px;
      padding: clamp(28px, 6vw, 48px) clamp(20px, 5vw, 36px);
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(74, 72, 67, 0.06), 
                  inset 0 1px 1px rgba(255, 255, 255, 0.9);
      animation: cardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Title Styling - Elegant Serif */
    .intro-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 2.7rem);
      font-weight: 800;
      color: #4a4843; /* Charcoal */
      margin-bottom: clamp(10px, 3vw, 16px);
      line-height: 1.25;
      letter-spacing: -0.3px;
    }

    .intro-subtitle {
      font-size: clamp(0.9rem, 2.8vw, 1.02rem);
      color: rgba(74, 72, 67, 0.82);
      margin-bottom: clamp(20px, 5vw, 32px);
      line-height: 1.55;
      font-weight: 300;
    }

    /* Antique Botanical Button */
    .btn {
      position: relative;
      background: linear-gradient(135deg, #cfb068 0%, #dca796 100%); /* Old gold to muted coral */
      color: #f5f2eb;
      border: 1px solid rgba(74, 72, 67, 0.15);
      padding: clamp(12px, 3.2vw, 16px) clamp(24px, 6vw, 36px);
      font-size: clamp(0.85rem, 2.5vw, 0.95rem);
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(207, 176, 104, 0.25);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      overflow: hidden;
      width: 100%;
      max-width: 280px;
      display: inline-block;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(207, 176, 104, 0.4);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Poetic hint details */
    .intro-hint {
      font-size: clamp(0.7rem, 2.2vw, 0.78rem);
      color: rgba(74, 72, 67, 0.55);
      margin-top: 18px;
      line-height: 1.4;
      font-weight: 400;
    }

    /* Graceful Error Container */
    #error-message {
      display: none;
      color: #92400e;
      margin-top: 20px;
      padding: 16px;
      background: rgba(207, 176, 104, 0.06);
      border: 1px solid rgba(207, 176, 104, 0.25);
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.55;
    }

    #error-message h3 {
      font-weight: 600;
      margin-bottom: 6px;
      font-family: 'Playfair Display', serif;
    }

    /* Minimalist HUD */
    .hud-container {
      position: absolute;
      bottom: clamp(16px, 4vw, 24px);
      left: clamp(16px, 4vw, 24px);
      background: rgba(245, 242, 235, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(74, 72, 67, 0.15);
      border-radius: 14px;
      padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 18px);
      z-index: 8;
      color: #4a4843;
      font-size: 0.76rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(74, 72, 67, 0.04);
      transition: opacity 0.5s ease, transform 0.5s ease;
      opacity: 0;
      transform: translateY(10px);
      width: clamp(180px, 50vw, 220px);
    }

    .hud-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hud-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .hud-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(74, 72, 67, 0.5);
      font-size: 0.65rem;
      flex-shrink: 0;
      width: 45px;
    }

    .hud-bar-bg {
      flex-grow: 1;
      height: 5px;
      background: rgba(74, 72, 67, 0.08);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .hud-bar-fill {
      height: 100%;
      width: 0%;
      background: #7d8c82; /* Muted gray-green */
      border-radius: 10px;
      transition: width 0.1s ease;
    }

    .hud-indicator-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #cfb068; /* Old gold */
      z-index: 2;
    }

    .hud-info {
      font-size: 0.62rem;
      color: rgba(74, 72, 67, 0.45);
      text-align: center;
      margin-top: 2px;
      letter-spacing: 0.1px;
    }

    /* Flower Selector Panel */
    .selector-container {
      position: absolute;
      top: clamp(16px, 4vw, 24px);
      left: 50%;
      transform: translate(-50%, -10px);
      background: rgba(245, 242, 235, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(74, 72, 67, 0.15);
      border-radius: 50px;
      padding: 5px;
      z-index: 8;
      display: flex;
      gap: 4px;
      box-shadow: 0 10px 30px rgba(74, 72, 67, 0.04);
      transition: opacity 0.5s ease, transform 0.5s ease;
      opacity: 0;
      pointer-events: none;
      max-width: 90%;
    }

    .selector-container.visible {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .selector-btn {
      background: transparent;
      border: none;
      color: rgba(74, 72, 67, 0.65);
      padding: clamp(8px, 2vw, 10px) clamp(12px, 3.5vw, 20px);
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.72rem, 2.2vw, 0.82rem);
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }

    .selector-btn.active {
      background: linear-gradient(135deg, #7d8c82 0%, #dca796 100%); /* gray-green to muted coral */
      color: #f5f2eb;
      box-shadow: 0 4px 12px rgba(220, 167, 150, 0.2);
    }

    /* Small screens responsive tweaks */
    @media (max-width: 480px) {
      .intro-card {
        border-radius: 20px;
      }
      .hud-container {
        width: calc(100% - 32px); /* Full width minus margins on tiny screens */
        left: 16px;
        bottom: 16px;
      }
      .selector-container {
        top: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Fine fibrous paper texture overlay -->
  <div class="paper-texture"></div>

  <!-- Interactive p5 Canvas Container -->
  <div id="canvas-container"></div>

  <!-- Full-Screen Intro Card Screen (tap anywhere to trigger prompt) -->
  <div id="intro-overlay" onclick="handleOverlayClick(event)">
    <div class="intro-card" id="intro-content">
      <h1 class="intro-title">Blow to Bloom</h1>
      <p class="intro-subtitle">
        A celestial fractal plant study.<br>
        Nurture its growth with the warmth of your breath.
      </p>
      <button class="btn" id="enable-btn">Enable Study</button>
      <p class="intro-hint">
        Best experienced with headphones/mic in a quiet space.<br>
        No audio data is sent or saved.
      </p>
      
      <!-- Hidden by default, shown if access is denied -->
      <div id="error-message"></div>
    </div>
  </div>

  <!-- Minimalist HUD -->
  <div id="hud" class="hud-container">
    <div class="hud-item">
      <span class="hud-label">Breath</span>
      <div class="hud-bar-bg">
        <div id="hud-bar-energy" class="hud-bar-fill"></div>
        <div id="hud-threshold" class="hud-indicator-line"></div>
      </div>
    </div>
    <div class="hud-item">
      <span class="hud-label">Bloom</span>
      <div class="hud-bar-bg">
        <div id="hud-bar-growth" class="hud-bar-fill" style="background: linear-gradient(90deg, #7d8c82, #dca796);"></div>
      </div>
    </div>
    <div class="hud-info">Tap canvas to recalibrate silence</div>
  </div>

  <!-- Flower Selector Panel -->
  <div id="flower-selector" class="selector-container">
    <button class="selector-btn active" onclick="switchFlower('dragon')">Dragon Spiral</button>
    <button class="selector-btn" onclick="switchFlower('plant')">Botanical Shrub</button>
    <button class="selector-btn" onclick="switchFlower('lace')">Celestial Lace</button>
  </div>

  <script>
    // --- SKETCH CONSTANTS & VARIABLES ---
    let segments = [];             // Precomputed flower segments {p1, p2, t, isStem, isBranch, isTwig}
    let scaleFactor = 1.0;         // Responsive scaling factor
    let currentFlowerType = "dragon"; // "dragon", "plant", or "lace"
    
    // Audio / Microphone Inputs
    let mic;                       // p5.AudioIn object
    let breathEnergy = 0.0;        // Smoothed energy (0.0 to 1.0)
    let noiseFloor = 0.012;        // Silence threshold (recalibrated by clicks)
    let maxInputLevel = 0.25;      // The mic level considered "maximum blow"
    
    // Bloom physics interpolation
    let targetGrowth = 0.0;        // Mapped breath goal (0.0 to 1.0)
    let currentGrowth = 0.0;       // Smoothly interpolated growth (0.0 to 1.0)
    let isAudioActive = false;     // True when mic starts successfully
    let calibrationRing = null;    // Click feedback indicator
    
    // Aesthetic elements
    let floatingOrnaments = [];    // Pre-calculated background stars, crosses
    let driftingFragments = [];    // Real-time drifting leaf/petal fragments
    
    // Plant bounding box dimensions (for absolute viewport scale adaptation)
    let normMinX = 0, normMaxX = 0;
    let normMinY = 0, normMaxY = 0;
    
    // L-System Configurations
    const flowerConfigs = {
      dragon: {
        axiom: "FX",
        rules: { 'X': "X+YF+", 'Y': "-FX-Y" },
        angle: 90,
        iterations: 11
      },
      plant: {
        axiom: "X",
        rules: {
          'X': "F+[[X]-X]-F[-FX]+X",
          'F': "FF"
        },
        angle: 25,
        iterations: 5
      },
      lace: {
        axiom: "YF",
        rules: {
          'X': "YF+XF+Y",
          'Y': "XF-YF-X"
        },
        angle: 60,
        iterations: 6
      }
    };

    // --- SETUP & GENERATIVE COMPUTATION ---
    function setup() {
      const canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('canvas-container');
      
      // Compute flower L-system structure
      generateFlower(currentFlowerType);
      
      // Scatter background celestial ornaments
      createOrnaments();
      
      // Initialize mic instance
      mic = new p5.AudioIn();
    }

    // --- GENERATE FLOATING BACKGROUND ORNAMENTS ---
    function createOrnaments() {
      floatingOrnaments = [];
      let types = ['star', 'cross', 'dot'];
      for (let i = 0; i < 12; i++) {
        floatingOrnaments.push({
          type: random(types),
          x: random(width * 0.1, width * 0.9),
          y: random(height * 0.1, height * 0.9),
          size: random(6, 11),
          phase: random(TWO_PI),
          speed: random(0.005, 0.015),
          rotation: random(TWO_PI)
        });
      }
    }

    // --- GENERATE, CLASSIFY & NORMALIZE L-SYSTEM PLANT SEGMENTS ---
    function generateFlower(type) {
      let config = flowerConfigs[type];
      let currentInstruction = config.axiom;
      
      // Expand L-System instructions
      for (let i = 0; i < config.iterations; i++) {
        let next = "";
        for (let char of currentInstruction) {
          if (config.rules[char]) {
            next += config.rules[char];
          } else {
            next += char;
          }
        }
        currentInstruction = next;
      }
      
      // Trace coordinates using branch stack mechanics
      let rawSegments = [];
      let currentPos = createVector(0, 0);
      let currentAngle = -HALF_PI; // pointing straight up
      let angleDelta = radians(config.angle);
      let stepSize = 10;
      let stack = [];
      
      for (let idx = 0; idx < currentInstruction.length; idx++) {
        let char = currentInstruction[idx];
        if (char === 'F') {
          let nextPos = createVector(
            currentPos.x + cos(currentAngle) * stepSize,
            currentPos.y + sin(currentAngle) * stepSize
          );
          
          // Identify branch tips for plants (segments that precede a pop or terminate a path)
          let isBranchTip = false;
          if (type === 'plant') {
            let lookAhead = currentInstruction.substring(idx + 1, idx + 8);
            if (lookAhead.startsWith(']') || lookAhead.startsWith('-]') || lookAhead.startsWith('+]')) {
              isBranchTip = true;
            }
          }
          
          rawSegments.push({
            p1: currentPos.copy(),
            p2: nextPos.copy(),
            depth: stack.length,
            isBranchTip: isBranchTip
          });
          currentPos = nextPos;
        } else if (char === '+') {
          currentAngle += angleDelta;
        } else if (char === '-') {
          currentAngle -= angleDelta;
        } else if (char === '[') {
          stack.push({ pos: currentPos.copy(), angle: currentAngle });
        } else if (char === ']') {
          let state = stack.pop();
          currentPos = state.pos;
          currentAngle = state.angle;
        }
      }
      
      // Find raw bounding box of L-system output
      let minX = 0, maxX = 0;
      let minY = 0, maxY = 0;
      for (let seg of rawSegments) {
        minX = min(minX, seg.p1.x, seg.p2.x);
        maxX = max(maxX, seg.p1.x, seg.p2.x);
        minY = min(minY, seg.p1.y, seg.p2.y);
        maxY = max(maxY, seg.p1.y, seg.p2.y);
      }
      
      let plantW = maxX - minX;
      let plantH = maxY - minY;
      if (plantW === 0) plantW = 0.001;
      if (plantH === 0) plantH = 0.001;
      
      // Normalize coordinate system relative to plant height.
      // This leaves coordinates relative to base (0,0) but fits exactly 1.0 unit in height.
      segments = rawSegments.map((seg, idx) => {
        let p1 = seg.p1.copy().div(plantH);
        let p2 = seg.p2.copy().div(plantH);
        return {
          p1: p1,
          p2: p2,
          t: idx / rawSegments.length,
          depth: seg.depth,
          isBranchTip: seg.isBranchTip
        };
      });
      
      // Update normalized bounding box bounds
      normMinX = minX / plantH;
      normMaxX = maxX / plantH;
      normMinY = minY / plantH;
      normMaxY = maxY / plantH;
      
      // Assign anatomical classifications (stem vs branch vs twig)
      segments.forEach((seg, idx) => {
        let isStem = false;
        let isBranch = false;
        let isTwig = false;
        
        if (type === 'plant') {
          if (seg.depth === 0) {
            isStem = true;
          } else if (seg.depth <= 2) {
            isBranch = true;
          } else {
            isTwig = true;
          }
        } else {
          // for continuous paths like dragon / lace
          if (seg.t < 0.22) {
            isStem = true;
          } else if (seg.t < 0.8) {
            isBranch = true;
          } else {
            isTwig = true;
          }
        }
        
        seg.isStem = isStem;
        seg.isBranch = isBranch;
        seg.isTwig = isTwig;
      });
      
      // Select 5 spaced segments to sprout large detailed leaves
      let leafIndices = [];
      let numLeaves = 5;
      for (let j = 0; j < numLeaves; j++) {
        let targetPct = 0.15 + (j / (numLeaves - 1)) * 0.6; // from 15% to 75% depth
        let idx = floor(targetPct * segments.length);
        if (idx >= 0 && idx < segments.length && !leafIndices.includes(idx)) {
          leafIndices.push(idx);
          segments[idx].leafInfo = {
            size: random(25, 38),
            side: (j % 2 === 0) ? 1 : -1,
            motifType: j, // Cycles through motifs 0-4
            angleOffset: random(0.3, 0.7) * ((j % 2 === 0) ? 1 : -1)
          };
        }
      }
      
      // Find 3 segments to sprout smaller buds
      let budIndices = [];
      if (type === 'plant') {
        let tips = [];
        for (let idx = 0; idx < segments.length; idx++) {
          if (segments[idx].isBranchTip) {
            tips.push(idx);
          }
        }
        if (tips.length > 0) {
          let step = max(1, floor(tips.length / 3));
          for (let k = 0; k < tips.length && budIndices.length < 3; k += step) {
            let idx = tips[k];
            if (!segments[idx].leafInfo) {
              budIndices.push(idx);
              segments[idx].budInfo = {
                size: random(10, 14)
              };
            }
          }
        }
      }
      
      // Fallback or for dragon/lace
      if (budIndices.length < 3) {
        let budPcts = [0.35, 0.58, 0.82];
        for (let k = 0; k < budPcts.length; k++) {
          let idx = floor(budPcts[k] * segments.length);
          if (idx >= 0 && idx < segments.length && !segments[idx].leafInfo && !segments[idx].budInfo) {
            budIndices.push(idx);
            segments[idx].budInfo = {
              size: random(10, 14)
            };
          }
        }
      }
    }

    // --- MAIN RENDER LOOP ---
    function draw() {
      // Light warm cream background
      background(245, 242, 235);
      
      // Draw soft watercolor background mists
      noStroke();
      fill(217, 184, 184, 12); // Faded pink wash
      ellipse(width * 0.75, height * 0.25, width * 0.5, width * 0.5);
      
      fill(159, 161, 134, 10); // Pale olive wash
      ellipse(width * 0.25, height * 0.75, width * 0.6, width * 0.6);
      
      fill(220, 167, 150, 8); // Muted coral wash
      ellipse(width * 0.45, height * 0.5, width * 0.4, width * 0.4);
      
      // Calculate responsive scale factor (plant occupies exactly 76% height)
      scaleFactor = height * 0.76;
      
      // Position base anchor asymmetrically (offset to left, leaving space for card text)
      let centerX = width * 0.42 - (normMinX + normMaxX) * 0.5 * scaleFactor;
      let centerY = height * 0.5 - (normMinY + normMaxY) * 0.5 * scaleFactor;
      
      // Process Microphone level & update growth curves
      handleMicrophoneInput();
      
      // Draw specimen card thin borders and archival texts
      drawSpecimenFrame();
      
      // Draw floating stars and strange symbols in space
      drawOrnaments();
      
      // Render the plant segments (stems, leaves, buds, flowers)
      drawPlant(centerX, centerY);
      
      // Update and draw drifting fragments
      updateAndDrawFragments();
      
      // Click feedback ring
      drawCalibrationFeedback();
      
      // Update floating HUD indicators
      updateHUD();
    }

    // --- DRAW SPECIMEN FRAME & ARCHIVAL TEXT ---
    function drawSpecimenFrame() {
      // Thin delicate double frame
      stroke(74, 72, 67, 45); // Charcoal with low opacity
      strokeWeight(0.85);
      noFill();
      rect(30, 30, width - 60, height - 60, 4);
      rect(34, 34, width - 68, height - 68, 2);
      
      // Archival text metadata
      noStroke();
      fill(74, 72, 67, 150);
      
      // Serif titles (Playfair Display)
      textFont('Playfair Display');
      textSize(11);
      textAlign(LEFT, TOP);
      text("CELESTIAL BOTANICALS  //  PLATE VII", 48, 48);
      
      textAlign(RIGHT, TOP);
      text("INDEX SYSTEM: " + currentFlowerType.toUpperCase(), width - 48, 48);
      
      textAlign(LEFT, BOTTOM);
      let classification = "CLASSIFICATION: FRACTALIA SYSTEMA (SPIRAL)";
      if (currentFlowerType === 'plant') {
        classification = "CLASSIFICATION: FRACTALIA SYSTEMA (ARBOR)";
      } else if (currentFlowerType === 'lace') {
        classification = "CLASSIFICATION: FRACTALIA SYSTEMA (RETICULUM)";
      }
      text(classification, 48, height - 48);
      
      textAlign(RIGHT, BOTTOM);
      let stageText = currentGrowth > 0.05 ? "STAGE: EFFLORESCENCE" : "STAGE: DORMANT (SEMINA)";
      text(stageText, width - 48, height - 48);
    }

    // --- DRAW FLOATING BACKGROUND CELESTIAL ORNAMENTS ---
    function drawOrnaments() {
      for (let orn of floatingOrnaments) {
        let pulse = sin(frameCount * orn.speed + orn.phase);
        let size = orn.size * (1.0 + pulse * 0.1 + breathEnergy * 0.2); // pulses with breath!
        let opacity = map(pulse, -1, 1, 25, 75) + breathEnergy * 25;
        
        let col = (orn.type === 'star') ? color(207, 176, 104, opacity) : color(74, 72, 67, opacity * 0.8);
        
        stroke(col);
        strokeWeight(0.75);
        noFill();
        
        push();
        translate(orn.x, orn.y);
        rotate(orn.rotation + frameCount * (orn.speed * 0.05));
        
        if (orn.type === 'star') {
          drawStar(0, 0, size);
        } else if (orn.type === 'cross') {
          line(-size / 2, 0, size / 2, 0);
          line(0, -size / 2, 0, size / 2);
        } else if (orn.type === 'dot') {
          noStroke();
          fill(red(col), green(col), blue(col), opacity);
          ellipse(0, 0, 2, 2);
        }
        pop();
      }
    }

    // --- DRAW FOUR-POINT CELESTIAL STAR ---
    function drawStar(x, y, size) {
      beginShape();
      vertex(x, y - size);
      quadraticVertex(x, y, x + size, y);
      quadraticVertex(x, y, x, y + size);
      quadraticVertex(x, y, x - size, y);
      quadraticVertex(x, y, x, y - size);
      endShape(CLOSE);
    }

    // --- AUDIO PROCESSING & INTERPOLATION ---
    function handleMicrophoneInput() {
      if (!isAudioActive || !mic) return;
      
      let rawVolume = mic.getLevel();
      
      // Apply noise floor threshold filter
      let cleanedVolume = max(0, rawVolume - noiseFloor);
      
      // Map to full 0.0 to 1.0 energy range
      let targetEnergy = map(cleanedVolume, 0, maxInputLevel - noiseFloor, 0, 1, true);
      
      // Smooth mic input to filter out high-frequency jitters (organic feel)
      breathEnergy = lerp(breathEnergy, targetEnergy, 0.1);
      
      // Set target growth based on breath energy
      targetGrowth = breathEnergy;
      
      // Apply asymmetric physics:
      // Growth happens fast when blowing; retraction occurs slow and gentle when quiet.
      let diff = targetGrowth - currentGrowth;
      if (diff > 0) {
        currentGrowth += diff * 0.075; // Fast bloom speed
      } else {
        currentGrowth += diff * 0.016; // Slow folding speed
      }
      
      // Add subtle constant breathing oscillation even at rest
      let idleBreathe = sin(frameCount * 0.025) * 0.003;
      currentGrowth = constrain(currentGrowth + idleBreathe, 0, 1);
    }

    // --- DRAW THE PLANT COMPONENTS (SKELETON & TEXTURES) ---
    function drawPlant(cx, cy) {
      let visibleCount = floor(segments.length * currentGrowth);
      if (visibleCount < 1) return;
      
      push();
      translate(cx, cy);
      
      // 1. Draw Stems, Branches, and Twigs (skeleton lines)
      for (let i = 0; i < visibleCount; i++) {
        let seg = segments[i];
        
        // Calculate organic wind sway using magnitude to keep base still
        let swayStrength = map(currentGrowth, 0, 1, 1.2, 3.2) + breathEnergy * 6.0;
        
        let swayX1 = sin(frameCount * 0.012 + seg.p1.y * 4.0) * seg.p1.mag() * swayStrength;
        let swayY1 = cos(frameCount * 0.015 + seg.p1.x * 4.0) * seg.p1.mag() * (swayStrength * 0.35);
        let swayX2 = sin(frameCount * 0.012 + seg.p2.y * 4.0) * seg.p2.mag() * swayStrength;
        let swayY2 = cos(frameCount * 0.015 + seg.p2.x * 4.0) * seg.p2.mag() * (swayStrength * 0.35);
        
        let x1 = seg.p1.x * scaleFactor + swayX1;
        let y1 = seg.p1.y * scaleFactor + swayY1;
        let x2 = seg.p2.x * scaleFactor + swayX2;
        let y2 = seg.p2.y * scaleFactor + swayY2;
        
        let weight, col, alpha;
        if (seg.isStem) {
          weight = map(seg.t, 0, 0.25, 4.2, 2.5); // Thicker main stem
          col = color(125, 140, 130); // Gray-green
          alpha = 180;
        } else if (seg.isBranch) {
          weight = map(seg.t, 0.25, 0.8, 2.5, 1.2); // Secondary branches
          col = color(159, 161, 134); // Pale olive
          alpha = 160;
        } else {
          weight = 0.9; // Twigs
          col = color(207, 176, 104); // Old gold
          alpha = 140;
        }
        
        // Draw the textured sketch pencil line
        drawPencilLine(x1, y1, x2, y2, weight, alpha, col, i);
      }
      
      // 2. Draw Leaves (after stems, but before flowers/buds for correct depth)
      for (let i = 0; i < visibleCount; i++) {
        let seg = segments[i];
        if (seg.leafInfo) {
          let swayStrength = map(currentGrowth, 0, 1, 1.2, 3.2) + breathEnergy * 6.0;
          let swayX2 = sin(frameCount * 0.012 + seg.p2.y * 4.0) * seg.p2.mag() * swayStrength;
          let swayY2 = cos(frameCount * 0.015 + seg.p2.x * 4.0) * seg.p2.mag() * (swayStrength * 0.35);
          
          let x2 = seg.p2.x * scaleFactor + swayX2;
          let y2 = seg.p2.y * scaleFactor + swayY2;
          
          let angle = atan2(seg.p2.y - seg.p1.y, seg.p2.x - seg.p1.x);
          
          // Draw leaf with its unique interior motif
          drawDetailedLeaf(x2, y2, seg.leafInfo.size, seg.leafInfo.size * 0.58, angle + seg.leafInfo.angleOffset, seg.leafInfo.motifType, i, currentGrowth);
        }
      }
      
      // 3. Draw Buds (spaced tips)
      for (let i = 0; i < visibleCount; i++) {
        let seg = segments[i];
        if (seg.budInfo && i !== visibleCount - 1) {
          let swayStrength = map(currentGrowth, 0, 1, 1.2, 3.2) + breathEnergy * 6.0;
          let swayX2 = sin(frameCount * 0.012 + seg.p2.y * 4.0) * seg.p2.mag() * swayStrength;
          let swayY2 = cos(frameCount * 0.015 + seg.p2.x * 4.0) * seg.p2.mag() * (swayStrength * 0.35);
          
          let x2 = seg.p2.x * scaleFactor + swayX2;
          let y2 = seg.p2.y * scaleFactor + swayY2;
          
          drawBud(x2, y2, seg.budInfo.size, currentGrowth);
        }
      }
      
      // 4. Draw Blossoms or Growing Buds at active tips
      let tipSeg = segments[visibleCount - 1];
      let swayStrength = map(currentGrowth, 0, 1, 1.2, 3.2) + breathEnergy * 6.0;
      let swayX2 = sin(frameCount * 0.012 + tipSeg.p2.y * 4.0) * tipSeg.p2.mag() * swayStrength;
      let swayY2 = cos(frameCount * 0.015 + tipSeg.p2.x * 4.0) * tipSeg.p2.mag() * (swayStrength * 0.35);
      
      let tx = tipSeg.p2.x * scaleFactor + swayX2;
      let ty = tipSeg.p2.y * scaleFactor + swayY2;
      
      if (visibleCount === segments.length) {
        // fully bloomed
        drawMainBlossom(tx, ty, 68, currentGrowth, breathEnergy);
      } else {
        // active growing tip
        drawBud(tx, ty, 15, currentGrowth);
      }
      
      pop();
    }

    // --- DRAW TEXTURED SKETCH PENCIL LINES ---
    function drawPencilLine(x1, y1, x2, y2, weight, alpha, col, index) {
      let steps = (weight > 1.5) ? 3 : 2; // layers of lines to simulate graphite
      
      push();
      noFill();
      
      for (let s = 0; s < steps; s++) {
        // Seeded offset to create wobbly textures that do NOT jitter on screen
        let offsetSeed = index * 13.7 + s * 43.1;
        let ox1 = (noise(offsetSeed) - 0.5) * (weight * 0.7);
        let oy1 = (noise(offsetSeed + 10) - 0.5) * (weight * 0.7);
        let ox2 = (noise(offsetSeed + 20) - 0.5) * (weight * 0.7);
        let oy2 = (noise(offsetSeed + 30) - 0.5) * (weight * 0.7);
        
        stroke(red(col), green(col), blue(col), alpha * (s === 0 ? 0.8 : 0.45));
        strokeWeight(weight * (s === 0 ? 1.0 : 0.8) * random(0.8, 1.0));
        
        let mx = (x1 + x2) / 2 + (noise(offsetSeed + 40) - 0.5) * (weight * 1.5);
        let my = (y1 + y2) / 2 + (noise(offsetSeed + 50) - 0.5) * (weight * 1.5);
        
        beginShape();
        vertex(x1 + ox1, y1 + oy1);
        quadraticVertex(mx, my, x2 + ox2, y2 + oy2);
        endShape();
      }
      pop();
    }

    // --- DRAW BOTANICAL LEAVES WITH INTERNAL MOTIFS ---
    function drawDetailedLeaf(x, y, w, h, angle, motifType, index, growth) {
      if (growth < 0.1) return;
      
      let currentW = w * growth;
      let currentH = h * growth;
      
      push();
      translate(x, y);
      rotate(angle);
      
      // Pick background colors from Palette 3: Gray-green or Pale olive
      let baseColor = (index % 2 === 0) ? color(125, 140, 130, 25) : color(159, 161, 134, 25);
      
      // 1. Soft watercolor wash fill
      noStroke();
      for (let s = 0; s < 3; s++) {
        fill(red(baseColor), green(baseColor), blue(baseColor), 16 - s * 3);
        let ox = (noise(index * 5 + s) - 0.5) * 4;
        let oy = (noise(index * 5 + s + 10) - 0.5) * 4;
        let sw = currentW * (1.0 - s * 0.05);
        let sh = currentH * (1.0 - s * 0.05);
        drawLeafShapeGeometry(ox, oy, sw, sh);
      }
      
      // 2. Sketchy charcoal outlines
      noFill();
      stroke(74, 72, 67, 100); // Muted charcoal
      strokeWeight(0.8);
      for (let s = 0; s < 2; s++) {
        let ox = (noise(index * 7 + s) - 0.5) * 2;
        let oy = (noise(index * 7 + s + 10) - 0.5) * 2;
        drawLeafShapeGeometry(ox, oy, currentW, currentH);
      }
      
      // 3. Draw internal motifs
      stroke(74, 72, 67, 120);
      strokeWeight(0.75);
      
      if (motifType === 0) {
        // Motif 0: Fine linear veins
        line(0, 0, currentW * 0.95, 0); // main vein
        let numPairs = 4;
        for (let j = 1; j <= numPairs; j++) {
          let vx = currentW * (j / (numPairs + 1));
          let vlen = currentH * 0.35 * (1 - (j / (numPairs + 1)));
          line(vx, 0, vx + currentW * 0.1, -vlen);
          line(vx, 0, vx + currentW * 0.1, vlen);
        }
      } 
      else if (motifType === 1) {
        // Motif 1: Celestial moon & stars
        noStroke();
        fill(207, 176, 104, 200 * growth); // Old gold moon
        push();
        translate(currentW * 0.45, 0);
        rotate(-QUARTER_PI);
        ellipse(0, 0, currentH * 0.35, currentH * 0.35);
        fill(245, 242, 235); // Parchment background mask
        ellipse(-currentH * 0.09, 0, currentH * 0.32, currentH * 0.32);
        pop();
        
        // Stars
        fill(207, 176, 104, 220 * growth);
        drawStar(currentW * 0.25, -currentH * 0.15, currentH * 0.08);
        drawStar(currentW * 0.7, currentH * 0.12, currentH * 0.06);
      } 
      else if (motifType === 2) {
        // Motif 2: Decorative dotted rows (Smoky plum)
        noStroke();
        fill(108, 91, 107, 180 * growth); // Smoky plum
        let numDots = 6;
        for (let j = 1; j <= numDots; j++) {
          let dx = currentW * (j / (numDots + 1));
          ellipse(dx, 0, 2, 2);
          ellipse(dx, -currentH * 0.15 * sin(PI * (j / (numDots + 1))), 1.5, 1.5);
          ellipse(dx, currentH * 0.15 * sin(PI * (j / (numDots + 1))), 1.5, 1.5);
        }
      } 
      else if (motifType === 3) {
        // Motif 3: Pastel watercolor spots (Muted coral)
        noStroke();
        fill(220, 167, 150, 45 * growth);
        ellipse(currentW * 0.5, -currentH * 0.1, currentW * 0.32, currentH * 0.22);
        fill(217, 184, 184, 45 * growth);
        ellipse(currentW * 0.35, currentH * 0.08, currentW * 0.22, currentH * 0.18);
      } 
      else if (motifType === 4) {
        // Motif 4: Gold inner silhouette
        noStroke();
        fill(207, 176, 104, 30 * growth); // Soft gold wash
        drawLeafShapeGeometry(currentW * 0.12, 0, currentW * 0.68, currentH * 0.55);
        noFill();
        stroke(207, 176, 104, 140 * growth);
        strokeWeight(0.68);
        drawLeafShapeGeometry(currentW * 0.12, 0, currentW * 0.68, currentH * 0.55);
      }
      
      pop();
    }

    // --- LEAF SHAPE GEOMETRY GENERATOR ---
    function drawLeafShapeGeometry(x, y, w, h) {
      push();
      translate(x, y);
      beginShape();
      vertex(0, 0);
      bezierVertex(w * 0.3, -h * 0.5, w * 0.7, -h * 0.5, w, 0);
      bezierVertex(w * 0.7, h * 0.5, w * 0.3, h * 0.5, 0, 0);
      endShape(CLOSE);
      pop();
    }

    // --- DRAW REACTIVE CELESTIAL BLOSSOM ---
    function drawMainBlossom(x, y, maxSize, growth, breath) {
      if (growth < 0.1) return;
      
      let currentSize = maxSize * growth * (0.85 + breath * 0.15);
      
      push();
      translate(x, y);
      
      // Wind sway offset
      let swayX = sin(frameCount * 0.035) * 1.5;
      let swayY = cos(frameCount * 0.045) * 1.5;
      translate(swayX, swayY);
      
      // How much the petals are currently opened
      let bloomFactor = constrain(growth * 0.55 + breath * 0.45, 0, 1);
      
      // --- Layer 1: Outer Petals (Muted Coral) ---
      let numOuter = 5;
      let outerColor = color(220, 167, 150, 45); // Muted coral
      let outerOutline = color(74, 72, 67, 120);
      for (let j = 0; j < numOuter; j++) {
        let angle = (TWO_PI / numOuter) * j + frameCount * 0.001;
        let radialOffset = map(bloomFactor, 0, 1, currentSize * 0.1, currentSize * 0.35);
        let px = cos(angle) * radialOffset;
        let py = sin(angle) * radialOffset;
        
        push();
        translate(px, py);
        rotate(angle + HALF_PI);
        
        // Wash
        noStroke();
        fill(red(outerColor), green(outerColor), blue(outerColor), 35);
        drawPetalShapeGeometry(0, 0, currentSize * 0.38, currentSize * 0.58, bloomFactor);
        
        // Outline
        noFill();
        stroke(outerOutline);
        strokeWeight(0.75);
        drawPetalShapeGeometry(0, 0, currentSize * 0.38, currentSize * 0.58, bloomFactor);
        pop();
      }
      
      // --- Layer 2: Middle Petals (Faded Pink) ---
      let numMiddle = 5;
      let middleColor = color(217, 184, 184, 55); // Faded pink
      let middleOutline = color(74, 72, 67, 140);
      for (let j = 0; j < numMiddle; j++) {
        let angle = (TWO_PI / numMiddle) * j + (TWO_PI / numMiddle / 2) - frameCount * 0.0012;
        let radialOffset = map(bloomFactor, 0, 1, currentSize * 0.08, currentSize * 0.22);
        let px = cos(angle) * radialOffset;
        let py = sin(angle) * radialOffset;
        
        push();
        translate(px, py);
        rotate(angle + HALF_PI);
        
        // Wash
        noStroke();
        fill(red(middleColor), green(middleColor), blue(middleColor), 55);
        drawPetalShapeGeometry(0, 0, currentSize * 0.28, currentSize * 0.44, bloomFactor * 0.9);
        
        // Outline
        noFill();
        stroke(middleOutline);
        strokeWeight(0.8);
        drawPetalShapeGeometry(0, 0, currentSize * 0.28, currentSize * 0.44, bloomFactor * 0.9);
        pop();
      }
      
      // --- Layer 3: Inner Petals (Smoky Plum / Old Gold) ---
      let numInner = 4;
      let innerColor = color(108, 91, 107, 75); // Smoky plum
      let innerOutline = color(207, 176, 104, 170); // Old gold accents
      for (let j = 0; j < numInner; j++) {
        let angle = (TWO_PI / numInner) * j + frameCount * 0.0018;
        let radialOffset = map(bloomFactor, 0, 1, currentSize * 0.05, currentSize * 0.12);
        let px = cos(angle) * radialOffset;
        let py = sin(angle) * radialOffset;
        
        push();
        translate(px, py);
        rotate(angle + HALF_PI);
        
        // Wash
        noStroke();
        fill(red(innerColor), green(innerColor), blue(innerColor), 75);
        drawPetalShapeGeometry(0, 0, currentSize * 0.18, currentSize * 0.28, bloomFactor * 0.8);
        
        // Outline
        noFill();
        stroke(innerOutline);
        strokeWeight(0.9);
        drawPetalShapeGeometry(0, 0, currentSize * 0.18, currentSize * 0.28, bloomFactor * 0.8);
        pop();
      }
      
      // --- Center: Stamens (Old Gold filaments) ---
      if (bloomFactor > 0.15) {
        let numStamens = 8;
        let stamenLength = map(bloomFactor, 0.15, 1, 4, currentSize * 0.26);
        let stamenAlpha = map(bloomFactor, 0.15, 1, 0, 220);
        
        stroke(207, 176, 104, stamenAlpha); // Old gold
        strokeWeight(0.75);
        for (let j = 0; j < numStamens; j++) {
          let angle = (TWO_PI / numStamens) * j + frameCount * 0.004;
          let sx = cos(angle) * 3;
          let sy = sin(angle) * 3;
          let ex = cos(angle) * stamenLength;
          let ey = sin(angle) * stamenLength;
          
          line(sx, sy, ex, ey);
          
          noStroke();
          fill(207, 176, 104, stamenAlpha);
          ellipse(ex, ey, 2.5, 2.5);
          stroke(207, 176, 104, stamenAlpha);
        }
      }
      
      // Central seed node
      noStroke();
      fill(207, 176, 104, 220 * growth); // Old gold central stamen base
      ellipse(0, 0, currentSize * 0.08, currentSize * 0.08);
      
      pop();
    }

    // --- PETAL GEOMETRY GENERATOR ---
    function drawPetalShapeGeometry(x, y, w, h, bloomFactor) {
      push();
      translate(x, y);
      beginShape();
      vertex(0, 0);
      let flare = map(bloomFactor, 0, 1, w * 0.2, w * 0.65);
      let lengthFactor = h * 0.9;
      bezierVertex(-flare, -lengthFactor * 0.4, -w * 0.5, -lengthFactor * 0.85, 0, -h);
      bezierVertex(w * 0.5, -lengthFactor * 0.85, flare, -lengthFactor * 0.4, 0, 0);
      endShape(CLOSE);
      pop();
    }

    // --- DRAW BRANCH BUDS ---
    function drawBud(x, y, maxSize, growth) {
      if (growth < 0.1) return;
      
      let currentSize = maxSize * growth;
      
      push();
      translate(x, y);
      
      let col = color(217, 184, 184, 180); // Faded pink
      let outlineCol = color(74, 72, 67, 140);
      
      // Wash
      noStroke();
      fill(red(col), green(col), blue(col), 50);
      ellipse(0, -currentSize * 0.4, currentSize * 0.65, currentSize * 0.9);
      
      // Sepal outline structure
      noFill();
      stroke(outlineCol);
      strokeWeight(0.8);
      
      beginShape();
      vertex(-currentSize * 0.15, 0);
      bezierVertex(-currentSize * 0.35, -currentSize * 0.35, -currentSize * 0.18, -currentSize * 0.85, 0, -currentSize);
      endShape();
      
      beginShape();
      vertex(currentSize * 0.15, 0);
      bezierVertex(currentSize * 0.35, -currentSize * 0.35, currentSize * 0.18, -currentSize * 0.85, 0, -currentSize);
      endShape();
      
      // Pale green sepals wrapping base
      fill(159, 161, 134, 180); // Pale olive
      stroke(outlineCol);
      beginShape();
      vertex(-currentSize * 0.18, 0);
      bezierVertex(-currentSize * 0.25, -currentSize * 0.18, 0, -currentSize * 0.25, 0, -currentSize * 0.4);
      bezierVertex(0, -currentSize * 0.25, currentSize * 0.25, -currentSize * 0.18, currentSize * 0.18, 0);
      endShape(CLOSE);
      
      pop();
    }

    // --- UPDATE AND RENDER DRIFTING FRAGMENTS ---
    function updateAndDrawFragments() {
      // Spawn new drifting segments when breath velocity is high
      if (isAudioActive && breathEnergy > 0.18 && random() < 0.14) {
        let visibleCount = floor(segments.length * currentGrowth);
        if (visibleCount > 5) {
          // Select a random visible segment node
          let spawnSeg = segments[floor(random(visibleCount * 0.4, visibleCount))];
          let swayStrength = map(currentGrowth, 0, 1, 1.2, 3.2) + breathEnergy * 6.0;
          let swayX = sin(frameCount * 0.012 + spawnSeg.p2.y * 4.0) * spawnSeg.p2.mag() * swayStrength;
          let swayY = cos(frameCount * 0.015 + spawnSeg.p2.x * 4.0) * spawnSeg.p2.mag() * (swayStrength * 0.35);
          
          let sx = spawnSeg.p2.x * scaleFactor + swayX + (width * 0.42 - (normMinX + normMaxX) * 0.5 * scaleFactor);
          let sy = spawnSeg.p2.y * scaleFactor + swayY + (height * 0.5 - (normMinY + normMaxY) * 0.5 * scaleFactor);
          
          driftingFragments.push({
            x: sx,
            y: sy,
            vx: random(-1.2, 1.2) + (breathEnergy * random(1.2, 2.5)),
            vy: random(0.6, 1.8) + (breathEnergy * random(1.0, 2.0)),
            size: random(5, 9),
            angle: random(TWO_PI),
            rotSpeed: random(-0.04, 0.04),
            color: random([color(217, 184, 184), color(220, 167, 150), color(207, 176, 104)]), // Pink, Coral, Gold
            alpha: 190,
            swayPhase: random(TWO_PI),
            swaySpeed: random(0.02, 0.06),
            swayAmt: random(1.2, 2.8)
          });
        }
      }
      
      // Update and draw active fragments
      for (let i = driftingFragments.length - 1; i >= 0; i--) {
        let f = driftingFragments[i];
        
        // Physics update
        f.x += f.vx + sin(frameCount * f.swaySpeed + f.swayPhase) * f.swayAmt * 0.25;
        f.y += f.vy;
        f.angle += f.rotSpeed;
        f.alpha -= 1.4; // fade rate
        
        if (f.y > height || f.x < 0 || f.x > width || f.alpha <= 0) {
          driftingFragments.splice(i, 1);
          continue;
        }
        
        // Render
        push();
        translate(f.x, f.y);
        rotate(f.angle);
        
        // Watercolor fill wash
        noStroke();
        fill(red(f.color), green(f.color), blue(f.color), f.alpha * 0.28);
        ellipse(0, 0, f.size * 1.4, f.size * 0.8);
        
        // Charcoal sketch outline
        stroke(74, 72, 67, f.alpha * 0.45);
        strokeWeight(0.75);
        noFill();
        beginShape();
        for (let a = 0; a < TWO_PI; a += 0.6) {
          let r = f.size * 0.5 + (noise(a * 2.0 + f.size) - 0.5) * 1.2;
          vertex(cos(a) * r * 1.4, sin(a) * r * 0.8);
        }
        endShape(CLOSE);
        pop();
      }
    }

    // --- PALETTE 3 GRADIENT TRANSITION ---
    function getAestheticColor(t) {
      let c1, c2;
      if (t < 0.25) {
        // Base main stem: Gray-green -> Pale olive
        let pct = map(t, 0, 0.25, 0, 1);
        c1 = color(125, 140, 130);
        c2 = color(159, 161, 134);
        return lerpColor(c1, c2, pct);
      } else if (t < 0.55) {
        // Branches: Pale olive -> Faded pink
        let pct = map(t, 0.25, 0.55, 0, 1);
        c1 = color(159, 161, 134);
        c2 = color(217, 184, 184);
        return lerpColor(c1, c2, pct);
      } else if (t < 0.8) {
        // Twigs & Buds: Faded pink -> Muted coral
        let pct = map(t, 0.55, 0.8, 0, 1);
        c1 = color(217, 184, 184);
        c2 = color(220, 167, 150);
        return lerpColor(c1, c2, pct);
      } else {
        // Blossom: Muted coral -> Smoky plum
        let pct = map(t, 0.8, 1.0, 0, 1);
        c1 = color(220, 167, 150);
        c2 = color(108, 91, 107);
        return lerpColor(c1, c2, pct);
      }
    }

    // --- SWITCH ACTIVE FLOWER TYPE ---
    function switchFlower(type) {
      if (currentFlowerType === type) return;
      currentFlowerType = type;
      
      // Update UI button active states
      document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
      if (type === 'dragon') {
        document.querySelector('.selector-btn:nth-child(1)').classList.add('active');
      } else if (type === 'plant') {
        document.querySelector('.selector-btn:nth-child(2)').classList.add('active');
      } else {
        document.querySelector('.selector-btn:nth-child(3)').classList.add('active');
      }
      
      // Clear live fragments
      driftingFragments = [];
      
      // Regenerate L-system structures
      generateFlower(type);
      
      // Reset growth status for transition animation
      currentGrowth = 0.0;
    }

    // --- CLICK-TO-CALIBRATE HUD FEEDBACK ---
    function drawCalibrationFeedback() {
      if (calibrationRing) {
        noFill();
        stroke(207, 176, 104, calibrationRing.alpha); // Old gold ring
        strokeWeight(1.2);
        ellipse(calibrationRing.x, calibrationRing.y, calibrationRing.radius, calibrationRing.radius);
        
        noStroke();
        fill(74, 72, 67, calibrationRing.alpha); // Charcoal text
        textAlign(CENTER, CENTER);
        textFont('Playfair Display');
        textSize(11);
        text("Acoustic Floor Calibrated", calibrationRing.x, calibrationRing.y - 18);
        
        // Smoothly expand and fade ring out
        calibrationRing.radius = lerp(calibrationRing.radius, calibrationRing.maxRadius, 0.08);
        calibrationRing.alpha = lerp(calibrationRing.alpha, 0, 0.1);
        
        if (calibrationRing.alpha < 2) {
          calibrationRing = null;
        }
      }
    }

    // --- RECALIBRATE NOISE FLOOR ---
    function mousePressed() {
      // Prevent clicks/taps if intro overlay is still active
      if (document.getElementById('intro-overlay').style.display !== 'none') return;
      
      recalibrateFloor(mouseX, mouseY);
    }

    function recalibrateFloor(x, y) {
      let currentLevel = mic ? mic.getLevel() : 0.01;
      
      // Set noise floor to current volume plus small buffer
      noiseFloor = max(0.005, currentLevel + 0.006);
      
      // Trigger expanding circular feedback ring
      calibrationRing = {
        x: x,
        y: y,
        radius: 12,
        maxRadius: 85,
        alpha: 255
      };
    }

    // --- UPDATE HUD INTERFACE ---
    function updateHUD() {
      if (!isAudioActive) return;
      
      // Update HUD energy fill bar
      let energyPercentage = constrain(breathEnergy * 100, 0, 100);
      document.getElementById('hud-bar-energy').style.width = `${energyPercentage}%`;
      
      // Update HUD growth fill bar
      let growthPercentage = constrain(currentGrowth * 100, 0, 100);
      document.getElementById('hud-bar-growth').style.width = `${growthPercentage}%`;
      
      // Move yellow threshold indicator in the energy bar
      let thresholdPosition = constrain((noiseFloor / maxInputLevel) * 100, 0, 100);
      document.getElementById('hud-threshold').style.left = `${thresholdPosition}%`;
    }

    // --- WINDOW RESIZE ---
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      createOrnaments(); // Re-scatter ornaments within new screen dimensions
    }

    let isInitializing = false;

    // --- HANDLE OVERLAY TAP-ANYWHERE INTERACTION ---
    function handleOverlayClick(event) {
      // If error message is visible, don't trigger automatic initialization on random clicks
      const errorDiv = document.getElementById('error-message');
      if (errorDiv && errorDiv.style.display === 'block') {
        return;
      }
      initializeAudio();
    }

    // --- MICROPHONE PERMISSION INITIALIZATION ---
    function initializeAudio() {
      if (isAudioActive || isInitializing) return;
      isInitializing = true;

      // Start mic directly. p5.sound handles native prompt & AudioContext activation.
      mic.start(
        // Success callback
        () => {
          isAudioActive = true;
          isInitializing = false;
          
          // Show HUD and Selector panels
          document.getElementById('hud').classList.add('visible');
          document.getElementById('flower-selector').classList.add('visible');
          
          // Fade out intro overlay screen smoothly
          const overlay = document.getElementById('intro-overlay');
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.style.display = 'none';
          }, 800);
        },
        // Error callback
        (err) => {
          console.error("Microphone initialization error:", err);
          isInitializing = false;
          displayMicError();
        }
      );
    }

    // --- DETAILED ERROR MESSAGES FOR INSUFFICIENT PERMISSION ---
    function displayMicError() {
      const errorDiv = document.getElementById('error-message');
      errorDiv.innerHTML = `
        <h3>Microphone Access Blocked</h3>
        <p>This prototype needs microphone access to detect breath inputs and make the flower bloom.</p>
        <p style="margin: 8px 0; font-weight: 300;">Please check your browser settings: enable permission for this site, and click Try Again.</p>
        <p style="margin-bottom: 12px; font-size: 0.8rem; color: rgba(74, 72, 67, 0.65);">Note: Browsers restrict microphone access to 'localhost' or 'HTTPS' protocols on mobile devices.</p>
        <button class="btn" style="padding: 10px 24px; font-size: 0.9rem;" onclick="initializeAudio()">Try Again</button>
      `;
      errorDiv.style.display = 'block';
      
      // Hide the initial call-to-action button to show full error message card
      document.getElementById('enable-btn').style.display = 'none';
    }
  </script>
</body>
</html>
