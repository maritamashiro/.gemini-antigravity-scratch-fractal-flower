<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Breath-Bloom Fractal Flower 🌸</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="An interactive generative art prototype using p5.js. Blow into your microphone to make a glowing, hand-drawn dragon curve fractal flower bloom.">
  <meta name="keywords" content="p5.js, generative art, L-system, dragon curve, interactive web art, creative coding">
  
  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
  
  <!-- p5.js and p5.sound CDN Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>

  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f1ea; /* Warm cream/light gray background */
      font-family: 'Outfit', sans-serif;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* Paper texture overlay for the hand-drawn illustration feeling */
    .paper-texture {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0.08; /* Slightly stronger for print textures */
      /* SVG Turbulence noise creating realistic paper grains */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Full-screen Intro Glass Overlay (tap anywhere to enable mic) */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(244, 241, 234, 0.75); /* Light cream glassmorphism */
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
      padding: 24px;
      cursor: pointer;
    }

    /* Intro Card Design */
    .intro-card {
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(74, 72, 67, 0.08);
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(74, 72, 67, 0.08), 
                  inset 0 1px 1px rgba(255, 255, 255, 0.8);
      animation: cardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Title Styling with glowing neon gradients */
    .intro-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: #2c2a25;
      margin-bottom: 16px;
      line-height: 1.2;
      letter-spacing: -0.5px;
      text-shadow: 0 0 15px rgba(243, 198, 203, 0.3);
    }

    .intro-subtitle {
      font-size: 1rem;
      color: rgba(60, 58, 53, 0.8);
      margin-bottom: 32px;
      line-height: 1.6;
      font-weight: 300;
    }

    /* Pastel Button */
    .btn {
      position: relative;
      background: linear-gradient(135deg, #c5e9d6 0%, #f3c6cb 100%); /* Mint to blush pink pastels */
      color: #2c2a25;
      border: 1px solid rgba(74, 72, 67, 0.1);
      padding: 16px 36px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(243, 198, 203, 0.25);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(243, 198, 203, 0.45);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Graceful Error Container */
    #error-message {
      display: none;
      color: #c92a2a;
      margin-top: 20px;
      padding: 16px;
      background: rgba(201, 42, 42, 0.05);
      border: 1px solid rgba(201, 42, 42, 0.15);
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    #error-message h3 {
      font-weight: 600;
      margin-bottom: 8px;
    }

    /* Minimalist Audio & Calibration HUD */
    .hud-container {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(244, 241, 234, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(74, 72, 67, 0.1);
      border-radius: 16px;
      padding: 14px 18px;
      z-index: 3;
      color: #3c3a35;
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none; /* Let clicks pass to canvas */
      box-shadow: 0 10px 30px rgba(74, 72, 67, 0.05);
      transition: opacity 0.5s ease, transform 0.5s ease;
      opacity: 0;
      transform: translateY(10px);
    }

    .hud-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hud-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hud-label {
      width: 50px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(60, 58, 53, 0.5);
      font-size: 0.7rem;
    }

    .hud-bar-bg {
      width: 100px;
      height: 5px;
      background: rgba(74, 72, 67, 0.08);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .hud-bar-fill {
      height: 100%;
      width: 0%;
      background: #c5e9d6; /* Mint fill */
      border-radius: 10px;
      transition: width 0.1s ease;
    }

    .hud-indicator-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #f3c6cb; /* Blush pink threshold indicator */
      z-index: 2;
    }

    .hud-info {
      font-size: 0.65rem;
      color: rgba(60, 58, 53, 0.4);
      text-align: center;
      margin-top: 2px;
      letter-spacing: 0.2px;
    }

    /* Flower Selector Panel */
    .selector-container {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(244, 241, 234, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(74, 72, 67, 0.1);
      border-radius: 50px;
      padding: 6px;
      z-index: 8;
      display: flex;
      gap: 6px;
      box-shadow: 0 10px 30px rgba(74, 72, 67, 0.05);
      transition: opacity 0.5s ease, transform 0.5s ease;
      opacity: 0;
      transform: translate(-50%, -10px);
      pointer-events: none;
    }

    .selector-container.visible {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    .selector-btn {
      background: transparent;
      border: none;
      color: rgba(60, 58, 53, 0.6);
      padding: 10px 22px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .selector-btn.active {
      background: linear-gradient(135deg, #c5e9d6 0%, #f3c6cb 100%);
      color: #2c2a25;
      box-shadow: 0 4px 15px rgba(243, 198, 203, 0.2);
      border: 1px solid rgba(74, 72, 67, 0.05);
    }
  </style>
</head>
<body>

  <!-- Fine fibrous paper texture overlay -->
  <div class="paper-texture"></div>

  <!-- Interactive p5 Canvas Container -->
  <div id="canvas-container"></div>

  <!-- Full-Screen Intro Card Screen (tap anywhere to trigger prompt) -->
  <div id="intro-overlay" onclick="handleOverlayClick(event)">
    <div class="intro-card" id="intro-content">
      <h1 class="intro-title">Blow to Bloom</h1>
      <p class="intro-subtitle">
        Tap anywhere on the screen to enable your microphone, then blow softly near your phone or device to nurture a glowing fractal flower.
      </p>
      <button class="btn" id="enable-btn">Tap Screen to Start</button>
      
      <!-- Hidden by default, shown if access is denied -->
      <div id="error-message"></div>
    </div>
  </div>

  <!-- Minimalist HUD -->
  <div id="hud" class="hud-container">
    <div class="hud-item">
      <span class="hud-label">Breath</span>
      <div class="hud-bar-bg">
        <div id="hud-bar-energy" class="hud-bar-fill"></div>
        <div id="hud-threshold" class="hud-indicator-line"></div>
      </div>
    </div>
    <div class="hud-item">
      <span class="hud-label">Bloom</span>
      <div class="hud-bar-bg">
        <div id="hud-bar-growth" class="hud-bar-fill" style="background: linear-gradient(90deg, #62de66, #f06595);"></div>
      </div>
    </div>
    <div class="hud-info">Tap canvas to recalibrate silence</div>
  </div>

  <!-- Flower Selector Panel -->
  <div id="flower-selector" class="selector-container">
    <button class="selector-btn active" onclick="switchFlower('dragon')">Dragon Spiral</button>
    <button class="selector-btn" onclick="switchFlower('plant')">Botanical Shrub</button>
    <button class="selector-btn" onclick="switchFlower('lace')">Celestial Lace</button>
  </div>

  <script>
    // --- SKETCH CONSTANTS & VARIABLES ---
    let segments = [];             // Precomputed flower segments {p1, p2, t}
    let scaleFactor = 1.0;         // Responsive scaling factor
    let currentFlowerType = "dragon"; // "dragon" or "plant"
    
    // Audio / Microphone Inputs
    let mic;                       // p5.AudioIn object
    let breathEnergy = 0.0;        // Smoothed energy (0.0 to 1.0)
    let noiseFloor = 0.012;        // Silence threshold (recalibrated by clicks)
    let maxInputLevel = 0.25;      // The mic level considered "maximum blow"
    
    // Bloom physics interpolation
    let targetGrowth = 0.0;        // Mapped breath goal (0.0 to 1.0)
    let currentGrowth = 0.0;       // Smoothly interpolated growth (0.0 to 1.0)
    let isAudioActive = false;     // True when mic starts successfully
    let calibrationRing = null;    // Click feedback indicator
    
    // Aesthetic elements
    let floatingOrnaments = [];    // Pre-calculated stars, circles, and dots
    
    // L-System Configurations
    const flowerConfigs = {
      dragon: {
        axiom: "FX",
        rules: { 'X': "X+YF+", 'Y': "-FX-Y" },
        angle: 90,
        iterations: 11
      },
      plant: {
        axiom: "X",
        rules: {
          'X': "F+[[X]-X]-F[-FX]+X",
          'F': "FF"
        },
        angle: 25,
        iterations: 5
      },
      lace: {
        axiom: "YF",
        rules: {
          'X': "YF+XF+Y",
          'Y': "XF-YF-X"
        },
        angle: 60,
        iterations: 6
      }
    };

    // --- SETUP & GENERATIVE COMPUTATION ---
    function setup() {
      const canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('canvas-container');
      
      // Compute flower segments once at start
      generateFlower(currentFlowerType);
      
      // Scatter floating ornaments across the specimen card
      createOrnaments();
      
      // Initialize mic instance
      mic = new p5.AudioIn();
    }

    // --- GENERATE FLOATING ORNAMENTS ---
    function createOrnaments() {
      floatingOrnaments = [];
      let types = ['star', 'circle', 'cross', 'dot'];
      for (let i = 0; i < 20; i++) {
        floatingOrnaments.push({
          type: random(types),
          x: random(width * 0.08, width * 0.92),
          y: random(height * 0.08, height * 0.92),
          size: random(5, 12),
          phase: random(TWO_PI),
          speed: random(0.008, 0.02),
          rotation: random(TWO_PI)
        });
      }
    }

    // --- GENERATE & NORMALIZE L-SYSTEM FLOWER SEGMENTS ---
    function generateFlower(type) {
      let config = flowerConfigs[type];
      let currentInstruction = config.axiom;
      
      // Expand L-System instructions
      for (let i = 0; i < config.iterations; i++) {
        let next = "";
        for (let char of currentInstruction) {
          if (config.rules[char]) {
            next += config.rules[char];
          } else {
            next += char;
          }
        }
        currentInstruction = next;
      }
      
      // Trace coordinates using branch stack mechanics
      let rawSegments = [];
      let currentPos = createVector(0, 0);
      let currentAngle = -HALF_PI; // Default pointing straight up
      let angleDelta = radians(config.angle);
      let stepSize = 10;
      let stack = [];
      
      for (let char of currentInstruction) {
        if (char === 'F') {
          let nextPos = createVector(
            currentPos.x + cos(currentAngle) * stepSize,
            currentPos.y + sin(currentAngle) * stepSize
          );
          rawSegments.push({
            p1: currentPos.copy(),
            p2: nextPos.copy()
          });
          currentPos = nextPos;
        } else if (char === '+') {
          currentAngle += angleDelta;
        } else if (char === '-') {
          currentAngle -= angleDelta;
        } else if (char === '[') {
          stack.push({ pos: currentPos.copy(), angle: currentAngle });
        } else if (char === ']') {
          let state = stack.pop();
          currentPos = state.pos;
          currentAngle = state.angle;
        }
      }
      
      // Normalize coordinate system relative to base (p1 of first segment is (0,0))
      let maxDist = 0.001;
      for (let seg of rawSegments) {
        let d1 = seg.p1.mag();
        let d2 = seg.p2.mag();
        if (d1 > maxDist) maxDist = d1;
        if (d2 > maxDist) maxDist = d2;
      }
      
      // Shift, normalize coordinates, and compute progress parameter (t)
      segments = rawSegments.map((seg, idx) => {
        let p1 = seg.p1.copy().div(maxDist);
        let p2 = seg.p2.copy().div(maxDist);
        return {
          p1: p1,
          p2: p2,
          t: idx / rawSegments.length
        };
      });
    }

    // --- MAIN RENDER LOOP ---
    function draw() {
      // Light warm cream background (minimal trails for art print clarity)
      background(244, 241, 234, 180);
      
      // Calculate responsive scale factor (keeps entire curve on screen)
      scaleFactor = min(width, height) * 0.42;
      
      // Asymmetric anchors - offset to the left for a specimen card layout
      let centerX = width * 0.42;
      let centerY = height * 0.52;
      
      // Shift base anchor down for upward growing structures
      if (currentFlowerType === 'plant') {
        centerY = height * 0.65;
      } else if (currentFlowerType === 'lace') {
        centerY = height * 0.62; // Shift slightly down since Sierpinski arrowhead grows upwards
      }
      
      // Process Microphone level & update growth curves
      handleMicrophoneInput();
      
      // Draw specimen card thin borders and archival texts
      drawSpecimenFrame();
      
      // Draw background glows (very soft pastel hazes, highly transparent)
      drawAmbientBacklight(centerX, centerY);
      
      // Draw floating stars and strange symbols in space
      drawOrnaments();
      
      // Render generative flower layers
      drawFlowerSkeleton(centerX, centerY);
      drawTranslucentPetals(centerX, centerY);
      
      // Click feedback ring
      drawCalibrationFeedback();
      
      // Update floating HUD indicators
      updateHUD();
    }

    // --- DRAW SPECIMEN FRAME & ARCHIVAL TEXT ---
    function drawSpecimenFrame() {
      // Thin delicate double frame
      stroke(74, 72, 67, 40);
      strokeWeight(1);
      noFill();
      rect(30, 30, width - 60, height - 60, 4);
      
      // Archival text metadata
      noStroke();
      fill(74, 72, 67, 160);
      
      // Serif titles
      textFont('Playfair Display');
      textSize(12);
      textAlign(LEFT, TOP);
      text("HERBARIUM ARCHIVE  //  SPECIMEN NO. 12", 48, 48);
      
      textAlign(RIGHT, TOP);
      text("COORDINATES: 42°32'N / 19°08'E", width - 48, 48);
      
      textAlign(LEFT, BOTTOM);
      let classification = "CLASSIFICATION: FRACTALIA SYSTEMA (SPIRAL)";
      if (currentFlowerType === 'plant') {
        classification = "CLASSIFICATION: FRACTALIA SYSTEMA (ARBOR)";
      } else if (currentFlowerType === 'lace') {
        classification = "CLASSIFICATION: FRACTALIA SYSTEMA (RETICULUM)";
      }
      text(classification, 48, height - 48);
      
      textAlign(RIGHT, BOTTOM);
      let stageText = currentGrowth > 0.05 ? "STAGE: FULL BLOOM" : "STAGE: DORMANT // SEED FORM";
      text(stageText, width - 48, height - 48);
    }

    // --- DRAW FLOATING ASTRAL ORNAMENTS ---
    function drawOrnaments() {
      for (let orn of floatingOrnaments) {
        let pulse = sin(frameCount * orn.speed + orn.phase);
        let size = orn.size * (1.0 + pulse * 0.15 + breathEnergy * 0.3); // pulses with breath!
        let opacity = map(pulse, -1, 1, 30, 110) + breathEnergy * 40;
        
        stroke(74, 72, 67, opacity);
        strokeWeight(0.8);
        noFill();
        
        push();
        translate(orn.x, orn.y);
        rotate(orn.rotation + frameCount * (orn.speed * 0.08));
        
        if (orn.type === 'star') {
          drawStar(0, 0, size);
        } else if (orn.type === 'circle') {
          ellipse(0, 0, size, size);
          fill(74, 72, 67, opacity);
          noStroke();
          ellipse(0, 0, 1.5, 1.5);
        } else if (orn.type === 'cross') {
          line(-size / 2, 0, size / 2, 0);
          line(0, -size / 2, 0, size / 2);
        } else if (orn.type === 'dot') {
          noStroke();
          fill(74, 72, 67, opacity * 0.7);
          ellipse(0, 0, size * 0.3, size * 0.3);
        }
        pop();
      }
    }

    // --- DRAW FOUR-POINT CELESTIAL STAR ---
    function drawStar(x, y, size) {
      beginShape();
      vertex(x, y - size);
      quadraticVertex(x, y, x + size, y);
      quadraticVertex(x, y, x, y + size);
      quadraticVertex(x, y, x - size, y);
      quadraticVertex(x, y, x, y - size);
      endShape(CLOSE);
    }

    // --- AUDIO PROCESSING & INTERPOLATION ---
    function handleMicrophoneInput() {
      if (!isAudioActive || !mic) return;
      
      let rawVolume = mic.getLevel();
      
      // Apply noise floor threshold filter
      let cleanedVolume = max(0, rawVolume - noiseFloor);
      
      // Map to full 0.0 to 1.0 energy range
      let targetEnergy = map(cleanedVolume, 0, maxInputLevel - noiseFloor, 0, 1, true);
      
      // Smooth mic input to filter out high-frequency jitters (organic feel)
      breathEnergy = lerp(breathEnergy, targetEnergy, 0.1);
      
      // Set target growth based on breath energy
      targetGrowth = breathEnergy;
      
      // Apply asymmetric physics:
      // Growth happens fast when blowing; retraction occurs slow and gentle when quiet.
      let diff = targetGrowth - currentGrowth;
      if (diff > 0) {
        currentGrowth += diff * 0.075; // Fast bloom speed
      } else {
        currentGrowth += diff * 0.016; // Slow folding speed
      }
      
      // Add subtle constant breathing oscillation even at rest
      let idleBreathe = sin(frameCount * 0.02) * 0.003;
      currentGrowth = constrain(currentGrowth + idleBreathe, 0, 1);
    }

    // --- AMBIENT BACKLIGHTS & GLOWS (SOFT PASTEL MISTS) ---
    function drawAmbientBacklight(cx, cy) {
      push();
      translate(cx, cy);
      
      // Soft breathing aura size based on current bloom state
      let glowSize = currentGrowth * scaleFactor * 1.3;
      
      noStroke();
      
      // Soft pastel peach haze
      fill(253, 215, 195, 12); 
      ellipse(0, 0, scaleFactor * 1.5 + glowSize, scaleFactor * 1.5 + glowSize);
      
      // Soft pastel blue haze
      fill(204, 229, 244, 10); 
      ellipse(0, 0, scaleFactor * 0.9 + glowSize * 0.7, scaleFactor * 0.9 + glowSize * 0.7);
      
      pop();
    }

    // --- DRAW FLOWER SKELETON (THIN PENCIL CURVES) ---
    function drawFlowerSkeleton(cx, cy) {
      let visibleCount = floor(segments.length * currentGrowth);
      if (visibleCount < 1) return;
      
      push();
      translate(cx, cy);
      
      // Draw path segment-by-segment using bezier curves for painterly, flowing brush strokes
      for (let i = 0; i < visibleCount; i++) {
        let seg = segments[i];
        let p1 = seg.p1;
        let p2 = seg.p2;
        
        // Add low-frequency noise wobble for hand-illustrated organic movement (slower, smoother)
        let wobbleX1 = noise(p1.x * 2.0, p1.y * 2.0, frameCount * 0.001) * 4 - 2;
        let wobbleY1 = noise(p1.x * 2.0, p1.y * 2.0 + 10, frameCount * 0.001) * 4 - 2;
        let wobbleX2 = noise(p2.x * 2.0, p2.y * 2.0, frameCount * 0.001) * 4 - 2;
        let wobbleY2 = noise(p2.x * 2.0, p2.y * 2.0 + 10, frameCount * 0.001) * 4 - 2;
        
        let x1 = p1.x * scaleFactor + wobbleX1;
        let y1 = p1.y * scaleFactor + wobbleY1;
        let x2 = p2.x * scaleFactor + wobbleX2;
        let y2 = p2.y * scaleFactor + wobbleY2;
        
        // Midpoint with extra noise displacement to create curves (smoother wobble)
        let xc = (x1 + x2) / 2 + noise(p1.x * 4.0, p1.y * 4.0, frameCount * 0.001) * 6 - 3;
        let yc = (y1 + y2) / 2 + noise(p1.x * 4.0, p1.y * 4.0 + 20, frameCount * 0.001) * 6 - 3;
        
        let col = getAestheticColor(seg.t);
        
        // 1. Very faint watercolor backdrop vine stroke (pastel shadow)
        noFill();
        stroke(col.levels[0], col.levels[1], col.levels[2], 26);
        strokeWeight(6.0); 
        beginShape();
        vertex(x1, y1);
        quadraticVertex(xc, yc, x2, y2);
        endShape();
        
        // 2. Primary thin charcoal pencil stroke
        stroke(74, 72, 67, 150); 
        strokeWeight(0.9); 
        beginShape();
        vertex(x1, y1);
        quadraticVertex(xc, yc, x2, y2);
        endShape();
      }
      
      pop();
    }

    // --- DRAW TRANSLUCENT NEON PETALS (WATERCOLOR LEAF WASHES) ---
    function drawTranslucentPetals(cx, cy) {
      let visibleCount = floor(segments.length * currentGrowth);
      if (visibleCount < 1) return;
      
      push();
      translate(cx, cy);
      
      let step = 5; 
      
      for (let i = 0; i < visibleCount; i += step) {
        let seg = segments[i];
        let p = seg.p2;
        
        // Slower and smaller physical wind sway
        let wobbleX = noise(p.x * 2.0 + 5, p.y * 2.0, frameCount * 0.001) * 4 - 2;
        let wobbleY = noise(p.x * 2.0, p.y * 2.0 + 15, frameCount * 0.001) * 4 - 2;
        
        let sx = p.x * scaleFactor + wobbleX;
        let sy = p.y * scaleFactor + wobbleY;
        
        // Large, delicate watercolor leaf shapes
        let baseSize = map(seg.t, 0, 1, 14, 46) * (0.75 + currentGrowth * 0.35);
        
        // Breath oscillation for organic sway/pulse
        let petalPulse = sin(frameCount * 0.04 + i * 0.12) * 3.5;
        let petalW = baseSize + petalPulse;
        let petalH = (baseSize + petalPulse) * 0.6; 
        
        // Orient the petal rotation along the curve segment tangent
        let angle = atan2(seg.p2.y - seg.p1.y, seg.p2.x - seg.p1.x);
        
        push();
        translate(sx, sy);
        rotate(angle);
        
        let col = getAestheticColor(seg.t);
        let outlineCol = lerpColor(col, color(74, 72, 67), 0.55); // Color-matched pencil outline
        
        // 1. Soft Pastel Glow Wash
        noStroke();
        fill(col.levels[0], col.levels[1], col.levels[2], 12);
        ellipse(0, 0, petalW * 2.2, petalH * 2.2);
        
        // 2. Translucent leaf fill
        fill(col.levels[0], col.levels[1], col.levels[2], 35);
        drawLeafShape(0, 0, petalW, petalH);
        
        // 3. Delicate color-matched contour outline (static hand-drawn offset to avoid jittering)
        noFill();
        stroke(outlineCol.levels[0], outlineCol.levels[1], outlineCol.levels[2], 140);
        strokeWeight(0.85);
        
        let sketchOffsetX = (noise(i * 0.7 + 10) * 2 - 1) * 1.5;
        let sketchOffsetY = (noise(i * 0.7 + 20) * 2 - 1) * 1.5;
        drawLeafShape(sketchOffsetX, sketchOffsetY, petalW, petalH);
        
        pop();
      }
      
      pop();
    }

    // --- DRAW BOTANICAL LEAF GEOMETRY ---
    function drawLeafShape(x, y, w, h) {
      push();
      translate(x, y);
      beginShape();
      vertex(0, -h / 2);
      bezierVertex(w / 2, -h / 4, w / 2, h / 4, 0, h / 2);
      bezierVertex(-w / 2, h / 4, -w / 2, -h / 4, 0, -h / 2);
      endShape(CLOSE);
      pop();
    }

    // --- COLOR PALETTE GENERATOR (SOFT PASTELS) ---
    function getAestheticColor(t) {
      // blush pink, pale mint, butter yellow, soft peach, lavender, pale turquoise, light sky blue
      let c1, c2;
      
      if (t < 0.2) {
        // Light sky blue -> Pale turquoise
        let pct = map(t, 0, 0.2, 0, 1);
        c1 = color(204, 229, 244);
        c2 = color(194, 230, 233);
        return lerpColor(c1, c2, pct);
      } else if (t < 0.4) {
        // Pale turquoise -> Pale mint
        let pct = map(t, 0.2, 0.4, 0, 1);
        c1 = color(194, 230, 233);
        c2 = color(197, 233, 214);
        return lerpColor(c1, c2, pct);
      } else if (t < 0.6) {
        // Pale mint -> Butter yellow
        let pct = map(t, 0.4, 0.6, 0, 1);
        c1 = color(197, 233, 214);
        c2 = color(253, 240, 189);
        return lerpColor(c1, c2, pct);
      } else if (t < 0.8) {
        // Butter yellow -> Soft peach
        let pct = map(t, 0.6, 0.8, 0, 1);
        c1 = color(253, 240, 189);
        c2 = color(253, 215, 195);
        return lerpColor(c1, c2, pct);
      } else if (t < 0.9) {
        // Soft peach -> Blush pink
        let pct = map(t, 0.8, 0.9, 0, 1);
        c1 = color(253, 215, 195);
        c2 = color(243, 198, 203);
        return lerpColor(c1, c2, pct);
      } else {
        // Blush pink -> Lavender
        let pct = map(t, 0.9, 1.0, 0, 1);
        c1 = color(243, 198, 203);
        c2 = color(222, 211, 238);
        return lerpColor(c1, c2, pct);
      }
    }

    // --- SWITCH ACTIVE FLOWER TYPE ---
    function switchFlower(type) {
      if (currentFlowerType === type) return;
      currentFlowerType = type;
      
      // Update UI button states
      document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
      if (type === 'dragon') {
        document.querySelector('.selector-btn:nth-child(1)').classList.add('active');
      } else if (type === 'plant') {
        document.querySelector('.selector-btn:nth-child(2)').classList.add('active');
      } else {
        document.querySelector('.selector-btn:nth-child(3)').classList.add('active');
      }
      
      // Regenerate L-system flower segments
      generateFlower(type);
      
      // Reset growth state for transition animation
      currentGrowth = 0.0;
    }

    // --- CLICK-TO-CALIBRATE FEEDBACK ---
    function drawCalibrationFeedback() {
      if (calibrationRing) {
        noFill();
        stroke(253, 240, 189, calibrationRing.alpha); // Pastel butter yellow ring
        strokeWeight(1.5);
        ellipse(calibrationRing.x, calibrationRing.y, calibrationRing.radius, calibrationRing.radius);
        
        noStroke();
        fill(74, 72, 67, calibrationRing.alpha); // Charcoal text color
        textAlign(CENTER, CENTER);
        textFont('Playfair Display');
        textSize(12);
        text("Silence Calibrated", calibrationRing.x, calibrationRing.y - 22);
        
        // Smoothly expand and fade ring out
        calibrationRing.radius = lerp(calibrationRing.radius, calibrationRing.maxRadius, 0.1);
        calibrationRing.alpha = lerp(calibrationRing.alpha, 0, 0.12);
        
        if (calibrationRing.alpha < 2) {
          calibrationRing = null;
        }
      }
    }

    // --- RECALIBRATE NOISE FLOOR ---
    function mousePressed() {
      // Prevent clicks/taps if intro overlay is still active
      if (document.getElementById('intro-overlay').style.display !== 'none') return;
      
      recalibrateFloor(mouseX, mouseY);
    }

    function recalibrateFloor(x, y) {
      let currentLevel = mic ? mic.getLevel() : 0.01;
      
      // Set noise floor to current volume plus small buffer (safeguard against static background noise)
      noiseFloor = max(0.005, currentLevel + 0.006);
      
      // Trigger expanding circular feedback ring
      calibrationRing = {
        x: x,
        y: y,
        radius: 12,
        maxRadius: 85,
        alpha: 255
      };
    }

    // --- UPDATE HUD INTERFACE ---
    function updateHUD() {
      if (!isAudioActive) return;
      
      // Update HUD energy fill bar
      let energyPercentage = constrain(breathEnergy * 100, 0, 100);
      document.getElementById('hud-bar-energy').style.width = `${energyPercentage}%`;
      
      // Update HUD growth fill bar
      let growthPercentage = constrain(currentGrowth * 100, 0, 100);
      document.getElementById('hud-bar-growth').style.width = `${growthPercentage}%`;
      
      // Move yellow threshold indicator in the energy bar
      let thresholdPosition = constrain((noiseFloor / maxInputLevel) * 100, 0, 100);
      document.getElementById('hud-threshold').style.left = `${thresholdPosition}%`;
    }

    // --- WINDOW RESIZE ---
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      createOrnaments(); // Re-scatter ornaments within new screen dimensions
    }

    let isInitializing = false;

    // --- HANDLE OVERLAY TAP-ANYWHERE INTERACTION ---
    function handleOverlayClick(event) {
      // If error message is visible, don't trigger automatic initialization on random clicks
      const errorDiv = document.getElementById('error-message');
      if (errorDiv && errorDiv.style.display === 'block') {
        return;
      }
      initializeAudio();
    }

    // --- MICROPHONE PERMISSION INITIALIZATION ---
    function initializeAudio() {
      // Guard against multiple concurrent initialization runs
      if (isAudioActive || isInitializing) return;
      isInitializing = true;

      // Start mic directly. p5.sound handles native prompt & AudioContext activation.
      mic.start(
        // Success callback
        () => {
          isAudioActive = true;
          isInitializing = false;
          
          // Show HUD and Selector panels
          document.getElementById('hud').classList.add('visible');
          document.getElementById('flower-selector').classList.add('visible');
          
          // Fade out intro overlay screen smoothly
          const overlay = document.getElementById('intro-overlay');
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.style.display = 'none';
          }, 800);
        },
        // Error callback
        (err) => {
          console.error("Microphone initialization error:", err);
          isInitializing = false;
          displayMicError();
        }
      );
    }

    // --- DETAILED ERROR MESSAGES FOR INSUFFICIENT PERMISSION ---
    function displayMicError() {
      const errorDiv = document.getElementById('error-message');
      errorDiv.innerHTML = `
        <h3>Microphone Access Blocked</h3>
        <p>This prototype needs microphone access to detect breath inputs and make the flower bloom.</p>
        <p style="margin: 8px 0; font-weight: 300;">Please check your browser settings: enable permission for this site, and click Try Again.</p>
        <p style="margin-bottom: 12px; font-size: 0.8rem; color: rgba(255,255,255,0.4);">Note: Browsers restrict microphone access to 'localhost' or 'HTTPS' protocols on mobile devices.</p>
        <button class="btn" style="padding: 10px 24px; font-size: 0.9rem;" onclick="initializeAudio()">Try Again</button>
      `;
      errorDiv.style.display = 'block';
      
      // Hide the initial call-to-action button to show full error message card
      document.getElementById('enable-btn').style.display = 'none';
    }
  </script>
</body>
